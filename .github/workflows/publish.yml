name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global yarn@1.22.22
      - run: yarn install --frozen-lockfile
      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: >-
          node --eval '
          const { version } = require("./package.json");
          const expected = `v${version}`;
          if (process.env.RELEASE_TAG !== expected) {
            throw new Error(`Release tag ${process.env.RELEASE_TAG} must be ${expected}`);
          }'
      - run: yarn test:package
      - name: Check whether version is already published
        id: registry
        run: |
          package_spec=$(node --eval '
            const { name, version } = require("./package.json");
            process.stdout.write(`${name}@${version}`);
          ')
          if npm view "$package_spec" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish stable release
        if: ${{ steps.registry.outputs.published != 'true' && !github.event.release.prerelease }}
        run: npm publish
      - name: Publish prerelease
        if: ${{ steps.registry.outputs.published != 'true' && github.event.release.prerelease }}
        run: npm publish --tag next
