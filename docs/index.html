<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>空間ID試行環境</title>

  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
</head>

<body>
  <main class="container">
    <header class="page-header">
      <div class="page-title-wrap">
        <h1 data-i18n="pageTitle">空間ID試行環境</h1>
        <p class="page-description" data-i18n="pageDesc">
緯度・経度・標高・ズームレベルから空間ID（z/f/x/y）を算出できます。
地図をクリックして座標を入力することもできます。
        </p>
      </div>

      <div class="lang-switch">
        <label for="lang-select">Language</label>
        <select id="lang-select" aria-label="language switcher">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>
    </header>

    <div class="layout-grid">
      <div class="side-grid">
        <section class="panel input-panel">
          <div class="panel-header">
            <h2 data-i18n="inputTitle">入力</h2>
          </div>

          <form id="calc-form" class="form-grid" novalidate>
            <label class="field">
              <span class="field-label" data-i18n="latLabel">緯度（10進度）</span>
              <input
                type="number"
                id="lat"
                step="0.0000001"
                min="-85.05112878"
                max="85.05112878"
                value="35.7300467"
                inputmode="decimal"
                required
              />
            </label>

            <label class="field">
              <span class="field-label" data-i18n="lngLabel">経度（10進度）</span>
              <input
                type="number"
                id="lng"
                step="0.0000001"
                min="-180"
                max="180"
                value="139.7474538"
                inputmode="decimal"
                required
              />
            </label>

            <label class="field">
              <span class="field-label" data-i18n="altLabel">標高（m）</span>
              <input
                type="number"
                id="h"
                step="0.01"
                min="-33554431"
                max="33554431.99"
                value="0"
                inputmode="decimal"
              />
            </label>

            <label class="field">
              <span class="field-label" data-i18n="zoomLabel">ズームレベル</span>
              <input
                type="number"
                id="z"
                step="1"
                min="0"
                max="25"
                value="20"
                inputmode="numeric"
                required
              />
            </label>

            <div class="message-wrap">
              <p id="msg" class="message" aria-live="polite"></p>
            </div>
          </form>
        </section>

        <section class="panel result-panel">
          <div class="panel-header">
            <h2 data-i18n="resultTitle">出力</h2>
          </div>

          <div class="result-card">
            <div class="result-row">
              <div class="result-label" data-i18n="resultLabel">空間ID</div>
              <code id="zfxy" class="result-value">-</code>
            </div>
          </div>
        </section>
      </div>

      <div class="main-grid">
        <section class="panel map-panel">
          <div class="panel-header">
            <h2 data-i18n="mapTitle">地図</h2>
          </div>

          <div id="map" class="map" aria-label="map"></div>
        </section>
      </div>
    </div>

    <section class="panel links-panel">
      <div class="panel-header">
        <h2 data-i18n="linksTitle">関連情報</h2>
      </div>

      <ul class="link-list">
        <li>
          <a
            href="https://www.ipa.go.jp/digital/architecture/guidelines/4dspatio-temporal-guideline.html"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="guidelineLink"
          >
            4次元時空間情報利活用のための空間IDガイドライン
          </a>
        </li>
        <li>
          <a
            href="https://github.com/ODS-IS-STID"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="repoLink"
          >
            Open Data Spaces 4次元時空間ID 関連リポジトリ
          </a>
        </li>
      </ul>
    </section>

    <footer class="footer-note" data-i18n="footerNote">
      本画面は試行環境です。表示結果は利用者の責任においてご確認ください。
    </footer>
  </main>

  <script src="./vendor/spatialid/index.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>
  <script src="./app.js"></script>
</body>
</html>
